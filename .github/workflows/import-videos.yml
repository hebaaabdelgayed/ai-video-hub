name: Import YouTube Videos

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Import videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/import-youtube.mjs

      - name: Commit updated video data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update YouTube video data"
          file_pattern: data/videos.json
