name: Import YouTube Videos

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: youtube-import-and-pages
  cancel-in-progress: false

jobs:
  import-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Import videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/import-youtube.mjs

      - name: Commit updated video data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update YouTube video data"
          file_pattern: data/videos.json

      - name: Build
        run: node scripts/build.mjs

      - name: Add trust pages
        run: node scripts/postbuild-trust-pages.mjs

      - name: Apply SEO pilot
        run: node scripts/postbuild-seo-pilot.mjs

      - name: Apply video SEO enhancements
        run: node scripts/postbuild-video-seo.mjs

      - name: Add custom domain file
        run: printf "hebaahmedai.cloud\n" > dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
