name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build
        run: node scripts/build.mjs

      - name: Add trust pages
        run: node scripts/postbuild-trust-pages.mjs

      - name: Apply SEO pilot
        run: node scripts/postbuild-seo-pilot.mjs

      - name: Apply video SEO enhancements
        run: node scripts/postbuild-video-seo.mjs

      - name: Add custom domain file
        run: printf "hebaahmedai.cloud\n" > dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
