name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  workflow_run:
    workflows:
      - Import YouTube Videos
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build
        run: node scripts/build.mjs

      - name: Add article posts
        run: node scripts/postbuild-posts.mjs

      - name: Add social article posts
        run: node scripts/postbuild-social-posts.mjs

      - name: Add trust pages
        run: node scripts/postbuild-trust-pages.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
